<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitUP - Check Materiale Cloud</title>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#111;color:#fff;text-align:center}
button{padding:12px 20px;font-size:16px;margin:10px;border-radius:8px;border:none;cursor:pointer}
.login{margin-top:100px}
.app{display:none;padding:20px}
.ok{color:#8DC63F;font-weight:bold}
</style>
</head>

<body>

<div class="login" id="login">
  <h1>FitUP Check Materiale</h1>
  <button onclick="login()">Login con Google</button>
</div>

<div class="app" id="app">
  <h2>Sei loggato</h2>
  <div id="user"></div>
  <button onclick="logout()">Logout</button>

  <h3>Checklist Demo</h3>
  <div id="list"></div>
</div>

<script>
// ===== CONFIG FIREBASE (TUO) =====
const firebaseConfig = {
  apiKey: "AIzaSyAkdqagTY86afYpdJT43oMGY5UkopsTF5M",
  authDomain: "fitup-check-materiale.firebaseapp.com",
  projectId: "fitup-check-materiale",
  storageBucket: "fitup-check-materiale.firebasestorage.app",
  messagingSenderId: "838360520294",
  appId: "1:838360520294:web:a77ffe3854a354ee8affa7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ===== LOGIN =====
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// ===== LOGOUT =====
function logout(){
  auth.signOut();
}

// ===== CHECK UTENTE =====
auth.onAuthStateChanged(user=>{
  if(user){
    // controllo dominio
    if(!user.email.endsWith("@fitup.it")){
      alert("Accesso consentito solo account FitUP");
      auth.signOut();
      return;
    }

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("user").innerHTML=user.email;

    loadChecklist();
  }else{
    document.getElementById("login").style.display="block";
    document.getElementById("app").style.display="none";
  }
});

// ===== CHECKLIST BASE CLOUD =====
const palestra = new URLSearchParams(window.location.search).get("sede") || "default";

const items = [
  "Tornello",
  "Switch",
  "PC Desktop",
  "Stampante"
];

function loadChecklist(){
  const list = document.getElementById("list");
  list.innerHTML="";

  items.forEach(item=>{
    const id = item.replace(/\s/g,"_");

    db.collection("palestre")
      .doc(palestra)
      .collection("checklist")
      .doc(id)
      .onSnapshot(doc=>{

        const checked = doc.exists ? doc.data().ok : false;

        const div = document.createElement("div");

        div.innerHTML = `
          <button onclick="toggle('${id}','${item}')">
            ${checked ? "✅" : "⬜"} ${item}
          </button>
        `;

        list.appendChild(div);
      });
  });
}

// ===== TOGGLE =====
function toggle(id,item){
  const ref = db.collection("palestre")
    .doc(palestra)
    .collection("checklist")
    .doc(id);

  ref.get().then(doc=>{
    const current = doc.exists ? doc.data().ok : false;

    ref.set({
      nome: item,
      ok: !current,
      updatedAt: new Date()
    });
  });
}
</script>

</body>
</html>
