<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Check Materiale IT - Apertura Palestra</title>
  <meta name="description" content="Checklist materiale IT per apertura palestra FitUP" />
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#111827;--ok:#16a34a}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1180px;margin:auto;padding:24px}
    .hero,.toolbar,.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 6px 20px rgba(0,0,0,.05)}
    .hero{padding:24px;margin-bottom:16px;display:flex;gap:20px;justify-content:space-between;align-items:center}
    h1{margin:6px 0 4px;font-size:34px}.sub{color:var(--muted)}
    .progress-num{font-size:42px;font-weight:800;text-align:right}.progress-text{text-align:right;color:var(--muted)}
    .bar{height:12px;background:#eef2f7;border-radius:99px;overflow:hidden;margin:0 0 16px}.bar>div{height:100%;background:var(--brand);width:0%}
    .toolbar{padding:14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px}
    input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;font-size:14px}
    button{border:0;border-radius:14px;padding:12px 14px;font-weight:700;cursor:pointer}
    .primary{background:var(--brand);color:#fff}.secondary{background:#fff;border:1px solid var(--line);color:var(--text)}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .card{padding:18px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    h2{font-size:18px;margin:0}.badge{font-size:12px;background:#f3f4f6;border-radius:999px;padding:6px 10px;color:var(--muted);font-weight:700}
    .item{border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0;background:#fff}
    .row{display:flex;gap:10px;align-items:center;cursor:pointer}
    .box{width:24px;height:24px;border:2px solid #cbd5e1;border-radius:7px;display:grid;place-items:center;flex:0 0 auto;color:white;font-size:16px}
    .done .box{background:var(--ok);border-color:var(--ok)} .done .name{text-decoration:line-through;color:#9ca3af}
    .note{margin-top:10px}
    @media(max-width:800px){.hero{display:block}.progress-num,.progress-text{text-align:left}.toolbar,.grid{grid-template-columns:1fr}h1{font-size:28px}}
    @media print{.toolbar{display:none}.wrap{padding:0}.hero,.card{box-shadow:none}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div>
        <div class="sub">📦 Apertura palestra</div>
        <h1>Check materiale IT</h1>
        <div class="sub">Spunta il materiale all'arrivo merce. I dati restano salvati nel browser.</div>
      </div>
      <div>
        <div class="progress-num" id="pct">0%</div>
        <div class="progress-text" id="count">0 / 0 completati</div>
      </div>
    </section>
    <div class="bar"><div id="bar"></div></div>

    <section class="toolbar">
      <input id="sede" placeholder="Nome palestra / sede">
      <input id="search" placeholder="Cerca materiale">
      <button class="primary" id="csv">Esporta CSV</button>
      <button class="secondary" id="reset">Reset</button>
    </section>

    <main class="grid" id="app"></main>
  </div>

<script>
const sections=[
["🔧","Materiale tecnico base",["Tornello","Impianto Audio","Rack 19\\"","Patch Panel Rack","Dadi a gabbia per rack (20)","Ripiano Rack (2)","Ciabatta Shuko Rack (2)","Cavo Patch Ethernet 0,5m (3x10)","Cavo Patch Ethernet 1m (3x10)","Hard Disk","NVR Dahua"]],
["🌐","Networking & alimentazione",["Switch","Switch PoE","UPS","Ubiquiti Unifi (3)"]],
["📡","Sicurezza & comunicazione",["Telecamere","Staffe per telecamere","Lettori Kughi NFC (2)","Protezione esterna lettore"]],
["💻","Postazioni & hardware",["PC Desktop (2)","Monitor (2)","Kit tastiera & mouse wireless (2)","Tappetino mouse (2)","Webcam (2)","Tavoletta grafometrica (2)"]],
["🖨️","Stampa & gestione documenti",["Lettore Tessere e Sanitarie (2)","Lettore Banco RFID (2)","Ciabatta multipresa (2)","Stampante fiscale","Stampante multifunzione","Toner stampante (2)"]],
["🏋️‍♂️","Sistemi palestra & accessi",["SportTrick Setup","Player Red TV","Licenza Player Red TV","Edision HDMI Modulator 3in mini","Edision SDC-6 Partitore Antenna","Connettori F (10 confezioni da 4)","Cavo coassiale connettore F 1m","Licenza Office (2)"]],
["📶","Connettività & IoT",["Gigaset IP","iPhone 16e","Hub Ajax","Rex Ajax","Door Protect Ajax (2 per porta)","Pulsante Ajax (2)","Home Siren Ajax","Relay Ajax"]],
["📺","TV & segnaletica",["Televisore Hisense 75\\"","Televisore Hisense 65\\" (3)","Supporto da parete TV (4)"]],
["🚨","Cartellonistica",["Cartello Porta Allarmata (2)","Cartello Area Videosorvegliata (3)","Cartello Pulsante Emergenza Ajax (2 o più)","Striscione Lavora con noi"]],
["🔖","Adesivi Tornello / Accessi",["Adesivo Solo Entrata Tornello","Adesivo Solo Uscita Tornello","Adesivo Solo Emergenza Tornello (se presente sportello bandiera)","Adesivo Solo Staff"]],
["🏗️","Extra",["Transpallet manuale","Kit cancelleria"]]
];

const key="fitup-check-materiale-v1";
let state=JSON.parse(localStorage.getItem(key)||'{"checked":{},"notes":{},"sede":""}');
const id=(cat,item)=>(cat+"__"+item).toLowerCase().replace(/[^a-z0-9]+/g,"-");
const all=()=>sections.flatMap(s=>s[2].map(i=>({icon:s[0],cat:s[1],item:i,id:id(s[1],i)})));

function save(){
  state.sede=document.getElementById("sede").value;
  localStorage.setItem(key,JSON.stringify(state));
}

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const app=document.getElementById("app");
  app.innerHTML="";
  sections.forEach(([icon,cat,items])=>{
    const shown=items.filter(item=>(cat+" "+item).toLowerCase().includes(q));
    if(!shown.length)return;
    const done=shown.filter(item=>state.checked[id(cat,item)]).length;
    const card=document.createElement("section");
    card.className="card";
    card.innerHTML=`<div class="head"><h2>${icon} ${cat}</h2><span class="badge">${done}/${shown.length}</span></div>`;
    shown.forEach(item=>{
      const itemId=id(cat,item), isDone=!!state.checked[itemId];
      const div=document.createElement("div");
      div.className="item"+(isDone?" done":"");
      div.innerHTML=`<div class="row"><span class="box">${isDone?"✓":""}</span><strong class="name">${item}</strong></div><input class="note" placeholder="Note opzionali" value="${(state.notes[itemId]||"").replaceAll('"',"&quot;")}">`;
      div.querySelector(".row").onclick=()=>{state.checked[itemId]=!state.checked[itemId];save();render()};
      div.querySelector(".note").oninput=e=>{state.notes[itemId]=e.target.value;save()};
      card.appendChild(div);
    });
    app.appendChild(card);
  });
  const items=all(), completed=items.filter(x=>state.checked[x.id]).length, total=items.length, pct=Math.round(completed/total*100);
  document.getElementById("pct").textContent=pct+"%";
  document.getElementById("count").textContent=`${completed} / ${total} completati`;
  document.getElementById("bar").style.width=pct+"%";
}

document.getElementById("sede").value=state.sede||"";
document.getElementById("sede").oninput=save;
document.getElementById("search").oninput=render;
document.getElementById("reset").onclick=()=>{
  if(confirm("Azzerare tutti i check e le note?")){
    state={checked:{},notes:{},sede:document.getElementById("sede").value};
    save();
    render();
  }
};
document.getElementById("csv").onclick=()=>{
  const rows=[["Sede","Categoria","Materiale","Arrivato","Note"]];
  all().forEach(x=>rows.push([document.getElementById("sede").value,x.cat,x.item,state.checked[x.id]?"SI":"NO",state.notes[x.id]||""]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replaceAll('"','""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"}), url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url;
  a.download="check-materiale-"+(document.getElementById("sede").value||"palestra")+".csv";
  a.click();
  URL.revokeObjectURL(url);
};

render();
</script>
</body>
</html>
