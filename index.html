<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>FitUP Check Materiale</title>

<style>
body{
  font-family:Arial;
  background:#0f1a12;
  color:#fff;
  margin:0;
  padding:20px;
}

/* HEADER */
.hero{
  border:2px solid #8cff00;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

/* TOOLBAR */
.toolbar{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

input,select,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

.card{
  background:#f1f1f1;
  color:#000;
  border-radius:15px;
  padding:15px;
}

/* ACTIONS */
.actions{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:10px;
}

.actions button{
  padding:8px;
  border-radius:10px;
  cursor:pointer;
}

/* COLORI */
.a-ok{background:#8cff00;}
.a-missing{background:#ff9800;}
.a-damaged{background:#ff3b3b;color:#fff;}

</style>
</head>

<body>

<div class="hero">
  <h1>Check materiale IT</h1>
  <div id="meta"></div>
</div>

<div class="toolbar">
  <input id="search" placeholder="Cerca materiale">
  
  <select id="filter">
    <option value="all">Tutti</option>
    <option value="missing">Mancanti</option>
    <option value="ok">OK arrivati</option>
    <option value="damaged">Danneggiati</option>
  </select>
</div>

<div id="app" class="grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>

/* CONFIG FIREBASE */
firebase.initializeApp({
  apiKey: "XXX",
  authDomain: "XXX",
  projectId: "XXX"
});

var db = firebase.firestore();

/* VAR GLOBALI */
var user=null;
var sede="default";
var cloud={};
var sedeInfo=null;

/* STATUS DEFAULT */
function status(x){
  return cloud[x] && cloud[x].status ? cloud[x].status : "missing";
}

/* SET STATUS */
function setStatus(id,s){
  db.collection("check").doc(sede).collection("items").doc(id).set({
    status:s
  },{merge:true});
}

/* LISTEN DATI */
function listen(){
  db.collection("check").doc(sede).collection("items")
  .onSnapshot(function(snapshot){
    cloud={};
    snapshot.forEach(function(doc){
      cloud[doc.id]=doc.data();
    });
    render();
  });
}

/* LISTEN SEDE */
function listenSedeInfo(){
  db.collection("sedi").doc(sede).onSnapshot(function(doc){
    sedeInfo = doc.exists ? doc.data() : null;
    render();
  });
}

/* RENDER */
function render(){

  var container=document.getElementById("app");
  container.innerHTML="";

  var search=document.getElementById("search").value.toLowerCase();
  var filter=document.getElementById("filter").value;

  var info = sedeInfo || {};
  document.getElementById("meta").innerHTML =
    "Sede: "+(info.club||sede)+" | Utente: "+(user?user.email:"");

  var items=[
    "Switch",
    "Firewall",
    "Telecamere",
    "Server"
  ];

  items.forEach(function(name){

    var id=name;
    var st=status(id);

    if(search && !name.toLowerCase().includes(search)) return;
    if(filter!=="all" && st!==filter) return;

    var div=document.createElement("div");
    div.className="card";

    div.innerHTML=
      "<b>"+name+"</b>"+
      "<div class='actions'>"+
      "<button class='"+(st==="missing"?"a-missing":"")+"' data-s='missing'>Manca</button>"+
      "<button class='"+(st==="ok"?"a-ok":"")+"' data-s='ok'>OK arrivato</button>"+
      "<button class='"+(st==="damaged"?"a-damaged":"")+"' data-s='damaged'>Danneggiato</button>"+
      "</div>";

    div.querySelectorAll("button").forEach(function(btn){
      btn.onclick=function(){
        setStatus(id,btn.dataset.s);
      }
    });

    container.appendChild(div);

  });

}

/* AUTH */
firebase.auth().onAuthStateChanged(function(u){
  if(u){
    user=u;
    listenSedeInfo();
    listen();
  }else{
    firebase.auth().signInAnonymously();
  }
});

/* EVENTI UI */
document.getElementById("search").oninput=render;
document.getElementById("filter").onchange=render;

</script>

</body>
</html>
