<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FitUP - Check Materiale IT</title>
<meta name="theme-color" content="#1D1D1B">

<style>
:root{
  --fit-green:#8DC63F;
  --fit-black:#1D1D1B;
  --fit-white:#FFFFFF;
  --bg:#10110f;
  --glass:rgba(255,255,255,.72);
  --glass-dark:rgba(29,29,27,.72);
  --line-green:rgba(141,198,63,.7);
  --line-black:rgba(29,29,27,.35);
  --text:#1D1D1B;
  --muted:#6b7280;
  --ok:#8DC63F;
  --warn:#f59e0b;
  --bad:#dc2626;
  --pending:#94a3b8;
  --shadow:0 20px 60px rgba(0,0,0,.22);
  --radius:28px;
}

*{box-sizing:border-box}

html{
  -webkit-text-size-adjust:100%;
}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 10%, rgba(141,198,63,.35), transparent 30%),
    radial-gradient(circle at 85% 0%, rgba(141,198,63,.18), transparent 28%),
    linear-gradient(145deg,#1D1D1B 0%,#151613 38%,#eef5e8 38%,#f6f8f3 100%);
  background-attachment:fixed;
}

button,input,select{
  font-family:inherit;
  font-size:16px;
}

.wrap{
  max-width:1320px;
  margin:auto;
  padding:24px;
}

.glass{
  background:rgba(255,255,255,.70);
  border:1.5px solid rgba(255,255,255,.55);
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
}

.hero{
  position:relative;
  overflow:hidden;
  border-radius:34px;
  padding:26px;
  display:flex;
  justify-content:space-between;
  gap:24px;
  align-items:center;
  background:
    linear-gradient(135deg,rgba(29,29,27,.92),rgba(29,29,27,.74)),
    radial-gradient(circle at top right,rgba(141,198,63,.45),transparent 35%);
  border:2px solid var(--fit-green);
  color:#fff;
  box-shadow:0 28px 80px rgba(0,0,0,.35);
}

.hero:before{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.16),transparent);
  transform:translateX(-70%);
  animation:shine 6s infinite;
  pointer-events:none;
}

@keyframes shine{
  0%{transform:translateX(-80%)}
  40%,100%{transform:translateX(120%)}
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:18px;
}

.fit-logo{
  width:220px;
  max-width:100%;
  height:auto;
  display:block;
  filter:drop-shadow(0 10px 24px rgba(0,0,0,.35));
}

.hero h1{
  margin:14px 0 6px;
  font-size:40px;
  line-height:1;
  letter-spacing:-1px;
}

.sub{
  color:rgba(255,255,255,.78);
  line-height:1.45;
  max-width:720px;
}

.device{
  display:inline-flex;
  margin-top:14px;
  padding:9px 14px;
  border-radius:999px;
  color:var(--fit-green);
  border:1px solid rgba(141,198,63,.6);
  background:rgba(141,198,63,.12);
  font-weight:900;
}

.progress{
  text-align:right;
  min-width:190px;
}

.pct{
  font-size:54px;
  font-weight:900;
  color:var(--fit-green);
  line-height:1;
}

.count{
  color:rgba(255,255,255,.78);
  font-weight:900;
  margin-top:8px;
}

.bar{
  margin:18px 0;
  height:16px;
  border-radius:999px;
  background:rgba(255,255,255,.38);
  overflow:hidden;
  border:1px solid rgba(29,29,27,.18);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
}

.bar div{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#8DC63F,#d5ff9a);
  box-shadow:0 0 18px rgba(141,198,63,.8);
  transition:.25s;
}

.summary{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:16px;
}

.stat{
  border-radius:26px;
  padding:18px;
  border:2px solid var(--line-black);
  background:rgba(255,255,255,.78);
  box-shadow:0 18px 50px rgba(0,0,0,.14);
  backdrop-filter:blur(18px) saturate(150%);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
}

.stat.ok{border-color:var(--fit-green)}
.stat small{
  color:#4b5563;
  font-weight:900;
}

.stat strong{
  display:block;
  margin-top:8px;
  font-size:34px;
  font-weight:900;
}

.stat.ok strong{color:var(--fit-green)}
.stat.warn strong{color:var(--warn)}
.stat.bad strong{color:var(--bad)}
.stat.pending strong{color:var(--pending)}

.toolbar{
  display:grid;
  grid-template-columns:1fr 190px 155px 150px;
  gap:12px;
  padding:14px;
  margin-bottom:18px;
  border-radius:28px;
  border:2px solid rgba(29,29,27,.22);
  background:rgba(255,255,255,.78);
  box-shadow:0 20px 60px rgba(0,0,0,.16);
  backdrop-filter:blur(22px) saturate(170%);
  -webkit-backdrop-filter:blur(22px) saturate(170%);
}

input,select{
  width:100%;
  min-height:54px;
  border:2px solid rgba(29,29,27,.18);
  border-radius:18px;
  padding:13px 15px;
  outline:none;
  background:rgba(255,255,255,.82);
}

input:focus,select:focus{
  border-color:var(--fit-green);
  box-shadow:0 0 0 4px rgba(141,198,63,.22);
}

.btn{
  border:0;
  border-radius:18px;
  min-height:54px;
  padding:12px 16px;
  font-weight:900;
  cursor:pointer;
  transition:.12s;
}

.btn:active{transform:scale(.98)}
.primary{
  background:linear-gradient(135deg,#8DC63F,#b9eb73);
  color:var(--fit-black);
  border:2px solid #6fa82f;
}
.secondary{
  background:var(--fit-black);
  color:#fff;
  border:2px solid var(--fit-green);
}
.light{
  background:rgba(255,255,255,.78);
  color:var(--fit-black);
  border:2px solid rgba(29,29,27,.28);
}

.ready{
  display:none;
  margin-bottom:18px;
  padding:18px;
  border-radius:26px;
  text-align:center;
  font-weight:900;
  color:#244908;
  background:rgba(220,252,231,.78);
  border:2px solid var(--fit-green);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.ready.show{display:block}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.card{
  border-radius:30px;
  padding:18px;
  border:2px solid rgba(29,29,27,.24);
  background:rgba(255,255,255,.72);
  box-shadow:0 20px 60px rgba(0,0,0,.16);
  backdrop-filter:blur(24px) saturate(170%);
  -webkit-backdrop-filter:blur(24px) saturate(170%);
}

.card:hover{
  border-color:rgba(141,198,63,.75);
}

.head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

h2{
  margin:0;
  font-size:19px;
}

.badge{
  background:rgba(141,198,63,.16);
  color:#355d12;
  border:1px solid rgba(141,198,63,.55);
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:900;
}

.item{
  position:relative;
  overflow:hidden;
  border:2px solid rgba(29,29,27,.18);
  border-radius:22px;
  padding:14px;
  margin:11px 0;
  background:rgba(255,255,255,.72);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.7),0 10px 28px rgba(0,0,0,.08);
  backdrop-filter:blur(14px) saturate(150%);
  -webkit-backdrop-filter:blur(14px) saturate(150%);
}

.item.ok{
  background:rgba(241,249,233,.82);
  border-color:var(--fit-green);
}
.item.missing{
  background:rgba(255,247,230,.84);
  border-color:#f59e0b;
}
.item.damaged{
  background:rgba(255,240,240,.84);
  border-color:#dc2626;
}

.main{
  display:flex;
  gap:13px;
  align-items:flex-start;
}

.check{
  width:42px;
  height:42px;
  min-width:42px;
  border:2.5px solid rgba(29,29,27,.28);
  border-radius:13px;
  background:rgba(255,255,255,.86);
  display:grid;
  place-items:center;
  cursor:pointer;
  box-shadow:inset 0 1px 0 #fff,0 6px 16px rgba(0,0,0,.10);
}

.check svg{
  width:32px;
  height:32px;
  opacity:0;
  transform:scale(.62);
  transition:.14s;
}

.ok .check{
  border-color:var(--fit-green);
  box-shadow:0 0 0 4px rgba(141,198,63,.18);
}
.ok .check svg{
  opacity:1;
  transform:scale(1);
}

.name{
  font-weight:900;
  line-height:1.28;
}
.ok .name{color:#4b7d12}
.missing .name{color:#92400e}
.damaged .name{color:#991b1b}

.actions{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:12px;
}

.actions button{
  border:2px solid rgba(29,29,27,.18);
  background:rgba(255,255,255,.75);
  border-radius:14px;
  min-height:42px;
  font-weight:900;
  cursor:pointer;
}

.actions .a-pending{background:#475569;color:#fff}
.actions .a-ok{background:var(--fit-green);color:var(--fit-black);border-color:#6fa82f}
.actions .a-missing{background:#f59e0b;color:#111827;border-color:#d97706}
.actions .a-damaged{background:#dc2626;color:#fff;border-color:#991b1b}

.note{
  display:none;
  margin-top:10px;
}
.missing .note,.damaged .note{
  display:block;
}

.footer{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:20px;
  flex-wrap:wrap;
}

@media(max-width:900px){
  .wrap{padding:12px}
  .hero{display:block}
  .logo-wrap{display:block}
  .fit-logo{width:180px}
  .hero h1{font-size:31px}
  .progress{text-align:left;margin-top:18px}
  .pct{font-size:44px}
  .summary{grid-template-columns:repeat(2,1fr)}
  .toolbar,.grid{grid-template-columns:1fr}
  .actions{grid-template-columns:repeat(2,1fr)}
  .btn{width:100%}
}

@media(min-width:1450px){
  .grid{grid-template-columns:repeat(3,1fr)}
}

@media print{
  body{background:#fff}
  .toolbar,.footer,.actions,.note,.device{display:none}
  .hero,.card,.stat{box-shadow:none}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="wrap">

<section class="hero">
  <div>
    <div class="logo-wrap">
      <svg class="fit-logo" viewBox="0 0 900 340" role="img" aria-label="FitUP">
        <rect width="900" height="340" fill="none"/>
        <text x="35" y="220" font-family="Arial Black, Arial, sans-serif" font-size="170" font-weight="900" fill="#8DC63F">FiT</text>
        <text x="390" y="220" font-family="Arial Black, Arial, sans-serif" font-size="170" font-weight="900" fill="#FFFFFF">UP</text>
        <circle cx="650" cy="160" r="125" fill="none" stroke="#FFFFFF" stroke-width="18"/>
        <path d="M560 70 C610 25,710 35,760 105" fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Check materiale IT</h1>
    <div class="sub">Controllo merce per apertura palestra. Interfaccia FitUP ottimizzata per touch, kiosk, tablet e desktop.</div>
    <div class="device" id="deviceLabel">Dispositivo: rilevamento...</div>
  </div>

  <div class="progress">
    <div class="pct" id="pct">0%</div>
    <div class="count" id="count">0 / 0 controllati</div>
  </div>
</section>

<div class="bar"><div id="bar"></div></div>

<section class="summary">
  <div class="stat ok"><small>OK</small><strong id="okCount">0</strong></div>
  <div class="stat warn"><small>Mancanti</small><strong id="missingCount">0</strong></div>
  <div class="stat bad"><small>Danneggiati</small><strong id="damagedCount">0</strong></div>
  <div class="stat pending"><small>Da controllare</small><strong id="pendingCount">0</strong></div>
</section>

<div class="ready" id="readyBanner">✅ Tutto il materiale risulta controllato e conforme.</div>

<section class="toolbar">
  <input id="search" placeholder="Cerca materiale">
  <select id="filter">
    <option value="all">Tutti</option>
    <option value="pending">Da controllare</option>
    <option value="ok">OK</option>
    <option value="missing">Mancanti</option>
    <option value="damaged">Danneggiati</option>
  </select>
  <button class="btn primary" id="csv">Esporta CSV</button>
  <button class="btn secondary" id="reset">Reset</button>
</section>

<main class="grid" id="app"></main>

<div class="footer">
  <button class="btn light" id="printBtn">Stampa / PDF</button>
  <button class="btn primary" id="markAllOk">Segna tutto OK</button>
</div>

</div>

<script>
(function(){
var sections=[
{icon:"🔧",title:"Materiale tecnico base",items:["Tornello","Impianto Audio","Rack 19\"","Patch Panel Rack","Dadi a gabbia per rack (20)","Ripiano Rack (2)","Ciabatta Shuko Rack (2)","Cavo Patch Ethernet 0,5m (3x10)","Cavo Patch Ethernet 1m (3x10)","Hard Disk","NVR Dahua"]},
{icon:"🌐",title:"Networking & alimentazione",items:["Switch","Switch PoE","UPS","Ubiquiti Unifi (3)"]},
{icon:"📡",title:"Sicurezza & comunicazione",items:["Telecamere","Staffe per telecamere","Lettori Kughi NFC (2)","Protezione esterna lettore"]},
{icon:"💻",title:"Postazioni & hardware",items:["PC Desktop (2)","Monitor (2)","Kit tastiera & mouse wireless (2)","Tappetino mouse (2)","Webcam (2)","Tavoletta grafometrica (2)"]},
{icon:"🖨️",title:"Stampa & gestione documenti",items:["Lettore Tessere e Sanitarie (2)","Lettore Banco RFID (2)","Ciabatta multipresa (2)","Stampante fiscale","Stampante multifunzione","Toner stampante (2)"]},
{icon:"🏋️‍♂️",title:"Sistemi palestra & accessi",items:["SportTrick Setup","Player Red TV","Licenza Player Red TV","Edision HDMI Modulator 3in mini","Edision SDC-6 Partitore Antenna","Connettori F (10 confezioni da 4)","Cavo coassiale connettore F 1m","Licenza Office (2)"]},
{icon:"📶",title:"Connettività & IoT",items:["Gigaset IP","iPhone 16e","Hub Ajax","Rex Ajax","Door Protect Ajax (2 per porta)","Pulsante Ajax (2)","Home Siren Ajax","Relay Ajax"]},
{icon:"📺",title:"TV & segnaletica",items:["Televisore Hisense 75\"","Televisore Hisense 65\" (3)","Supporto da parete TV (4)"]},
{icon:"🚨",title:"Cartellonistica",items:["Cartello Porta Allarmata (2)","Cartello Area Videosorvegliata (3)","Cartello Pulsante Emergenza Ajax (2 o più)","Striscione Lavora con noi"]},
{icon:"🔖",title:"Adesivi Tornello / Accessi",items:["Adesivo Solo Entrata Tornello","Adesivo Solo Uscita Tornello","Adesivo Solo Emergenza Tornello (se presente sportello bandiera)","Adesivo Solo Staff"]},
{icon:"🏗️",title:"Extra",items:["Transpallet manuale","Kit cancelleria"]}
];

var key="fitup-check-materiale-v5";
var state=load();

function load(){try{return JSON.parse(localStorage.getItem(key)||'{"items":{},"notes":{}}')}catch(e){return{items:{},notes:{}}}}
function save(){try{localStorage.setItem(key,JSON.stringify(state))}catch(e){}}
function id(cat,item){return(cat+"__"+item).toLowerCase().replace(/[^a-z0-9]+/g,"-")}
function status(x){return state.items[x]||"pending"}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function all(){var a=[];for(var s=0;s<sections.length;s++){for(var i=0;i<sections[s].items.length;i++){a.push({cat:sections[s].title,item:sections[s].items[i],id:id(sections[s].title,sections[s].items[i])})}}return a}
function tick(){return '<svg viewBox="0 0 1024 1024"><defs><linearGradient id="g" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#8DC63F"/></linearGradient></defs><path fill="url(#g)" d="M400.5 744.1c-35.6 0-67.9-20.5-83.1-52.8L205.2 452.7c-21.6-45.9-1.9-100.6 44-122.2 45.9-21.6 100.6-1.9 122.2 44l44.5 94.6L642.6 160.5c30-40.9 87.5-49.7 128.4-19.7 40.9 30 49.7 87.5 19.7 128.4L474.6 699.9c-17.3 23.6-44.8 37.6-74.1 44.2z"/></svg>'}
function device(){var ua=navigator.userAgent||"",w=innerWidth,h=innerHeight,t=("ontouchstart" in window)||(navigator.maxTouchPoints>0),k=/[?&]mode=kiosk/i.test(location.search);var d="Desktop 🖥️";if(k||(t&&w>=1000&&h>=650))d="Kiosk 🧾";else if(/iPhone|Android.*Mobile|Windows Phone/i.test(ua)||(t&&Math.min(w,h)<760))d="Mobile 📱";else if(/iPad|Tablet|Android/i.test(ua)||t)d="Tablet 📲";document.getElementById("deviceLabel").innerHTML="Dispositivo: "+d}

function render(){
device();
var q=(document.getElementById("search").value||"").toLowerCase();
var f=document.getElementById("filter").value;
var app=document.getElementById("app");app.innerHTML="";
for(var s=0;s<sections.length;s++){
 var sec=sections[s], shown=[];
 for(var i=0;i<sec.items.length;i++){
  var item=sec.items[i], itemId=id(sec.title,item), st=status(itemId);
  if((sec.title+" "+item).toLowerCase().indexOf(q)!==-1&&(f==="all"||f===st))shown.push(item);
 }
 if(!shown.length)continue;
 var done=0;for(var d=0;d<shown.length;d++){if(status(id(sec.title,shown[d]))!=="pending")done++}
 var card=document.createElement("section");card.className="card";
 card.innerHTML='<div class="head"><h2>'+sec.icon+' '+esc(sec.title)+'</h2><span class="badge">'+done+'/'+shown.length+'</span></div>';
 for(var j=0;j<shown.length;j++)addItem(card,sec.title,shown[j]);
 app.appendChild(card);
}
summary();
}

function addItem(card,cat,item){
var itemId=id(cat,item),st=status(itemId),note=state.notes[itemId]||"";
var div=document.createElement("div");div.className="item "+st;
div.innerHTML='<div class="main"><button class="check" type="button">'+tick()+'</button><div style="flex:1;min-width:0"><div class="name">'+esc(item)+'</div><div class="actions"><button data-s="pending" class="'+(st==="pending"?"a-pending":"")+'">Da fare</button><button data-s="ok" class="'+(st==="ok"?"a-ok":"")+'">OK</button><button data-s="missing" class="'+(st==="missing"?"a-missing":"")+'">Manca</button><button data-s="damaged" class="'+(st==="damaged"?"a-damaged":"")+'">Danno</button></div><input class="note" placeholder="Nota per mancanti/danneggiati" value="'+esc(note)+'"></div></div>';
div.querySelector(".check").onclick=function(){state.items[itemId]=st==="ok"?"pending":"ok";save();render()};
var bs=div.querySelectorAll(".actions button");for(var b=0;b<bs.length;b++){bs[b].onclick=function(){state.items[itemId]=this.getAttribute("data-s");save();render()}}
div.querySelector(".note").oninput=function(){state.notes[itemId]=this.value;save()};
card.appendChild(div);
}

function summary(){
var a=all(),ok=0,mi=0,da=0,pe=0;
for(var i=0;i<a.length;i++){var st=status(a[i].id);if(st==="ok")ok++;else if(st==="missing")mi++;else if(st==="damaged")da++;else pe++}
var comp=ok+mi+da,total=a.length,pct=total?Math.round(comp/total*100):0;
document.getElementById("okCount").innerHTML=ok;
document.getElementById("missingCount").innerHTML=mi;
document.getElementById("damagedCount").innerHTML=da;
document.getElementById("pendingCount").innerHTML=pe;
document.getElementById("pct").innerHTML=pct+"%";
document.getElementById("count").innerHTML=comp+" / "+total+" controllati";
document.getElementById("bar").style.width=pct+"%";
document.getElementById("readyBanner").className=(pe===0&&mi===0&&da===0&&ok===total)?"ready show":"ready";
}

document.getElementById("search").oninput=render;
document.getElementById("filter").onchange=render;
document.getElementById("printBtn").onclick=function(){window.print()};
document.getElementById("reset").onclick=function(){if(confirm("Azzerare tutti gli stati e le note?")){state={items:{},notes:{}};save();render()}};
document.getElementById("markAllOk").onclick=function(){if(confirm("Segnare tutto OK?")){var a=all();for(var i=0;i<a.length;i++)state.items[a[i].id]="ok";save();render()}};
document.getElementById("csv").onclick=function(){
var rows=[["Categoria","Materiale","Stato","Note"]],a=all();
for(var i=0;i<a.length;i++){var st=status(a[i].id),lab=st==="ok"?"OK":st==="missing"?"MANCANTE":st==="damaged"?"DANNEGGIATO":"DA CONTROLLARE";rows.push([a[i].cat,a[i].item,lab,state.notes[a[i].id]||""])}
var csv="";for(var r=0;r<rows.length;r++){var row=[];for(var c=0;c<rows[r].length;c++)row.push('"'+String(rows[r][c]).replace(/"/g,'""')+'"');csv+=row.join(",")+"\n"}
var blob=new Blob([csv],{type:"text/csv;charset=utf-8"}),url=URL.createObjectURL(blob),link=document.createElement("a");link.href=url;link.download="check-materiale-fitup.csv";document.body.appendChild(link);link.click();document.body.removeChild(link);URL.revokeObjectURL(url);
};
window.onresize=device;
render();
})();
</script>
</body>
</html>
