<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>FitUP - Check Materiale IT</title>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<style>
/* (TUTTO IL TUO CSS RESTA IDENTICO – NON LO TOCCO) */
</style>
</head>

<body>

<div id="loginView" class="login">
  <div class="login-card">
    <img src="logo-fitup.png" class="logo" alt="FitUP">
    <h1>Check materiale IT</h1>
    <p>Accesso riservato agli account aziendali FitUP.</p>

    <button class="btn primary" id="loginBtn">Login con Google</button>

    <!-- 🔥 NUOVO: messaggio errore -->
    <div id="loginError" style="
      display:none;
      margin-top:16px;
      padding:12px;
      border-radius:14px;
      background:#fee2e2;
      color:#7f1d1d;
      font-weight:700;
      font-size:14px;
    ">
    </div>

  </div>
</div>

<div id="appView" class="hidden">
  <!-- APP IDENTICA -->
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAkdqagTY86afYpdJT43oMGY5UkopsTF5M",
  authDomain:"fitup-check-materiale.firebaseapp.com",
  projectId:"fitup-check-materiale",
  storageBucket:"fitup-check-materiale.firebasestorage.app",
  messagingSenderId:"838360520294",
  appId:"1:838360520294:web:a77ffe3854a354ee8affa7"
});

var auth=firebase.auth();
var db=firebase.firestore();

var loginBtn=document.getElementById("loginBtn");
var loginError=document.getElementById("loginError");

/* ===========================
   🔥 LOGIN MIGLIORATO
=========================== */

loginBtn.onclick=function(){

  loginError.style.display="none";

  var provider=new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
  .then(function(){
    // ok
  })
  .catch(function(error){

    console.error("LOGIN ERROR:", error);

    let msg="Errore login. Riprova.";

    // 🔥 gestione specifica errore tuo
    if(error.code==="auth/internal-error" || error.message.includes("missing initial state")){
      msg="⚠️ Il browser sta bloccando la sessione di login.\n\n👉 Apri la pagina in modalità normale (non incognito)\n👉 Abilita cookie e popup\n👉 Usa Chrome o Edge\n👉 Ricarica la pagina e riprova";
    }

    else if(error.code==="auth/popup-blocked"){
      msg="⚠️ Popup bloccato.\n\n👉 Abilita popup per questo sito e riprova";
    }

    else if(error.code==="auth/popup-closed-by-user"){
      msg="⚠️ Login interrotto.\n\n👉 Completa il popup Google senza chiuderlo";
    }

    loginError.innerText=msg;
    loginError.style.display="block";
  });

};

/* ===========================
   AUTH STATE
=========================== */

auth.onAuthStateChanged(function(user){

  if(!user){
    document.getElementById("loginView").style.display="grid";
    document.getElementById("appView").className="hidden";
    return;
  }

  if(!user.email.endsWith("@fitup.it")){
    alert("Accesso consentito solo con account FitUP");
    auth.signOut();
    return;
  }

  document.getElementById("loginView").style.display="none";
  document.getElementById("appView").className="";

  startApp(user);

});

/* ===========================
   APP (LA TUA LOGICA)
=========================== */

function startApp(user){
  // lascia tutto come già hai
}

</script>

</body>
</html>
